<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started — Antigravity</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f11;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2d2d3a;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
    }
    .logo { font-size: 1.5rem; font-weight: 700; color: #a78bfa; margin-bottom: 0.5rem; }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.35rem; margin-top: 1.1rem; }
    input, textarea {
      width: 100%;
      background: #0f0f11;
      border: 1px solid #2d2d3a;
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      color: #e2e8f0;
      font-size: 0.95rem;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #a78bfa;
    }
    textarea { resize: vertical; min-height: 70px; }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }
    button[type="submit"] {
      width: 100%;
      margin-top: 1.75rem;
      padding: 0.8rem;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #6d28d9; }
    .footer { margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: #64748b; }
    .footer a { color: #a78bfa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Antigravity</div>
    <h1>Start your first campaign</h1>
    <p class="subtitle">Fill in a few details and your pipeline will be up and running within 24 hours.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/onboard">
      <label for="name">Business name *</label>
      <input type="text" id="name" name="name" placeholder="e.g. Apex Digital" required />

      <label for="niche">Your niche / what you do</label>
      <input type="text" id="niche" name="niche" placeholder="e.g. B2B SaaS for construction firms" />

      <label for="icp">Your ideal customer</label>
      <textarea id="icp" name="icp" placeholder="e.g. Mid-sized UK construction firms with 5+ projects running"></textarea>

      <label for="website">Your website</label>
      <input type="url" id="website" name="website" placeholder="https://yoursite.com" />

      <label for="calendar_link">Booking / calendar link</label>
      <input type="url" id="calendar_link" name="calendar_link" placeholder="https://calendly.com/you/30min" />

      <label for="email">Your email address *</label>
      <input type="email" id="email" name="email" placeholder="you@yourdomain.com" required />

      <button type="submit">Start my campaign &rarr;</button>
    </form>

    <div class="footer">Already signed up? <a href="/client/login">Log in &rarr;</a></div>
  </div>
</body>
</html>
